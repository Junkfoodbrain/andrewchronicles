<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Order - The Andrew Chronicles</title>
    <meta name="description"
        content="The Light In a Dark Corner pre-order form - Andrew's legal fight for justice and freedom, through the eyes of his grandmother">
    <meta name="author" content="Leah Sorensen">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Imprint+MT+Shadow&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/chron.js" defer></script>

    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
    <header class="hero">
        <img src="images/wall.webp" class="wall" alt="texture of the nav wall">

        <h1 class="hero-title">The Andrew Chronicles</h1>
    </header>
    <main>
        <nav class="order">
            <img src="images/logo_trans.webp" class="logo" alt="Guiding Lantern Press logo">
            <button class="nav-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false"
                aria-controls="site-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul id="site-menu">
                <li><a href="index.html" aria-current="page">Home</a></li>
                <li><a href="chronology.html">Chronology</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="support.html">Support</a></li>
                <li><a href="about.html">About Us!</a></li>
            </ul>
        </nav>
        <form id="preorder-form" novalidate>
            <div class="form-group">
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="last-name">Last Name:</label>
                <input type="text" id="last-name" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="quantity">Order Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>
            </div>
            <div class="form-group">
                <label for="address">Shipping Address:</label>
                <input type="text" id="address" name="address" required>
            </div>
            <button type="submit">Pre-Order Now</button>
            <p id="preorder-message" aria-live="polite"></p>
        </form>


    </main>
    <footer>
        <nav class="social" aria-label="Social Media Links">
            <a href="https://www.facebook.com" aria-label="Facebook">
                <img src="images/facebook.svg" alt="Facebook"></a>
        </nav>
        <p>&copy; 2026 Andrew Chronicles. All rights reserved.</p>
    </footer>
</body>

</html>
