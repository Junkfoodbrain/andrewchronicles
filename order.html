    <nav class="order">
        <img src="images/logo_trans.webp" class="logo" alt="Guiding Lantern Press logo">

    <main>
        <h1>Placeholder title</h1>
        <section class="order-form">
            <form method="get" action="confirmation.html" class="pre-order" aria-label="Pre-order form for The Andrew Chronicles">
                <fieldset>
                    <legend>Pre-Order The Andrew Chronicles</legend>
                    <label for="first">First Name:</label>
                    <input type="text" id="first" name="first" required aria-required="true">

                    <label for="last">Last Name:</label>
                    <input type="text" id="last" name="last" required aria-required="true">

                    <label for="shipping">Shipping Address:</label>
                    <input type="text" id="shipping" name="shipping" required aria-required="true">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required aria-required="true">

                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" min="1" value="1" required aria-required="true">

                    <button type="submit">Pre-Order Now</button>
                </fieldset>
        </section>"
